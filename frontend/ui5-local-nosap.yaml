# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json
specVersion: "4.0"
metadata:
  name: com.gpc.contracts.gpcgestindecontratos
type: application
framework:
  name: SAPUI5
  version: 1.148.1
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.richtexteditor
    - name: sap.ushell
    - name: themelib_sap_horizon
server:
  customMiddleware:
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        backend:
          - path: /api
            url: http://localhost:4000
          - path: /health
            url: http://localhost:4000
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
